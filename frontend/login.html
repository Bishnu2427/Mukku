<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Mukku AI Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050912; --card: #0c1424; --cyan: #00d4ff; --violet: #8b30ff;
      --border: rgba(0,212,255,0.09); --border-hov: rgba(0,212,255,0.22);
      --text: #d8eeff; --muted: rgba(216,238,255,0.45);
      --error: #ff4d6d; --success: #00c896;
      --mono: 'JetBrains Mono', monospace;
    }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; line-height: 1.6;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 1.5rem;
    }
    /* grid bg */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.028) 1px, transparent 1px);
      background-size: 64px 64px;
      animation: gridScroll 30s linear infinite;
    }
    @keyframes gridScroll { to { background-position: 64px 64px; } }
    /* orbs */
    .orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); z-index: 0; }
    .orb-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,48,255,0.07), transparent 70%); }
    .orb-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,212,255,0.06), transparent 70%); }

    .auth-wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; }

    /* logo */
    .auth-logo {
      display: flex; align-items: center; gap: .55rem;
      justify-content: center; margin-bottom: 2rem; text-decoration: none;
    }
    .auth-logo-text {
      font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.2rem;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* card */
    .auth-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem 2rem; position: relative; overflow: hidden;
    }
    .auth-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,48,255,0.5), rgba(0,212,255,0.3), transparent);
    }
    .auth-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem;
      font-weight: 700; letter-spacing: -.03em; margin-bottom: .35rem;
    }
    .auth-subtitle { font-size: .88rem; color: var(--muted); margin-bottom: 2rem; }
    .auth-subtitle a { color: var(--cyan); text-decoration: none; }
    .auth-subtitle a:hover { text-decoration: underline; }

    /* form */
    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block; font-family: var(--mono); font-size: .7rem;
      font-weight: 500; letter-spacing: .06em; color: var(--muted);
      text-transform: uppercase; margin-bottom: .45rem;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; opacity: .4; pointer-events: none;
    }
    .form-input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: .8rem 1rem .8rem 2.6rem;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .form-input::placeholder { color: var(--muted); }
    .form-input:focus { border-color: rgba(0,212,255,0.4); box-shadow: 0 0 0 3px rgba(0,212,255,0.07); }
    .form-input.error { border-color: var(--error); }

    /* password toggle */
    .pw-toggle {
      position: absolute; right: .9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0;
      color: var(--muted); transition: color .2s;
    }
    .pw-toggle:hover { color: var(--text); }

    /* remember + forgot row */
    .form-row-between {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem; gap: .5rem; flex-wrap: wrap;
    }
    .checkbox-label {
      display: flex; align-items: center; gap: .5rem;
      font-size: .83rem; color: var(--muted); cursor: pointer; user-select: none;
    }
    .checkbox-label input[type=checkbox] {
      width: 15px; height: 15px; accent-color: var(--cyan); cursor: pointer;
    }
    .forgot-link { font-size: .83rem; color: var(--cyan); text-decoration: none; }
    .forgot-link:hover { text-decoration: underline; }

    /* submit */
    .btn-submit {
      width: 100%; padding: .88rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      color: #fff; font-family: 'Space Grotesk', sans-serif;
      font-size: .95rem; font-weight: 600; letter-spacing: -.01em;
      cursor: pointer; transition: transform .2s, box-shadow .2s, opacity .2s;
      position: relative; overflow: hidden;
    }
    .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.25); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }
    .btn-submit .spinner {
      display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* alert */
    .alert {
      padding: .75rem 1rem; border-radius: 8px; font-size: .85rem;
      margin-bottom: 1.25rem; display: none; align-items: center; gap: .5rem;
    }
    .alert.error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.25); color: var(--error); display: flex; }
    .alert.success { background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,0.25); color: var(--success); display: flex; }

    /* divider */
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-family: var(--mono); font-size: .68rem; color: var(--muted); white-space: nowrap; }

    /* bottom link */
    .auth-bottom { text-align: center; margin-top: 1.5rem; font-size: .85rem; color: var(--muted); }
    .auth-bottom a { color: var(--cyan); text-decoration: none; font-weight: 500; }
    .auth-bottom a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .auth-card { padding: 2rem 1.4rem; }
      .auth-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="auth-wrap">
  <a href="/" class="auth-logo">
    <img src="/static/mukku_logo.png" alt="" height="30" onerror="this.style.display='none'" />
    <span class="auth-logo-text">Mukku AI Studio</span>
  </a>

  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Don't have an account? <a href="/register">Sign up free</a></p>

    <div id="alert" class="alert"></div>

    <!-- Step 1: email + password -->
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2.5 6.5l7.5 5 7.5-5M3 5h14a1 1 0 011 1v8a1 1 0 01-1 1H3a1 1 0 01-1-1V6a1 1 0 011-1z"/>
          </svg>
          <input id="email" name="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="4" y="9" width="12" height="9" rx="1.5"/><path d="M7 9V6a3 3 0 016 0v3"/>
          </svg>
          <input id="password" name="password" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <svg id="eye-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
              <path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"/><circle cx="10" cy="10" r="2.5"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-row-between">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" name="remember" />
          Remember me for 7 days
        </label>
        <a href="/forgot-password" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <span id="btn-text">Continue →</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>

    <!-- Step 2: OTP verification (hidden initially) -->
    <form id="otp-form" novalidate style="display:none;">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,rgba(139,48,255,0.2),rgba(0,212,255,0.2));border:1px solid rgba(0,212,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24">
            <path d="M4 4h16a1 1 0 011 1v14a1 1 0 01-1 1H4a1 1 0 01-1-1V5a1 1 0 011-1z"/>
            <path d="M3 7l9 6 9-6"/>
          </svg>
        </div>
        <p style="font-size:.88rem;color:var(--muted);line-height:1.6;" id="otp-hint">
          We sent a 6-digit code to your email.<br>Enter it below to complete sign-in.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="otp-code">Verification code</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="6" width="14" height="12" rx="1.5"/><path d="M7 6V5a3 3 0 016 0v1"/>
          </svg>
          <input id="otp-code" name="otp-code" type="text" inputmode="numeric" pattern="[0-9]*"
                 maxlength="6" class="form-input" placeholder="000000"
                 autocomplete="one-time-code" style="font-family:var(--mono);font-size:1.3rem;letter-spacing:.3em;text-align:center;padding-left:1rem;" />
        </div>
      </div>

      <button type="submit" class="btn-submit" id="otp-btn">
        <span id="otp-btn-text">Verify &amp; Sign In →</span>
        <div class="spinner" id="otp-spinner"></div>
      </button>

      <div style="text-align:center;margin-top:1rem;">
        <button type="button" id="back-btn" style="background:none;border:none;color:var(--muted);font-size:.82rem;cursor:pointer;text-decoration:underline;">
          Back to sign in
        </button>
      </div>
    </form>
  </div>

  <div class="auth-bottom">
    New to Mukku? <a href="/register">Create an account</a>
  </div>
</div>

<script>
  const loginForm = document.getElementById('login-form');
  const otpForm   = document.getElementById('otp-form');
  const alertEl   = document.getElementById('alert');
  const pwInput   = document.getElementById('password');
  const pwToggle  = document.getElementById('pw-toggle');
  const eyeIcon   = document.getElementById('eye-icon');

  let _otpToken  = null;
  let _remember  = false;

  // ── password visibility toggle ──────────────────────────────────────────────
  pwToggle.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="M3 3l14 14M7.5 7.9A3 3 0 0013 13M1 10s3.5-6 9-6m9 6s-1.5 2.5-4.5 4.5M10 16c-5.5 0-9-6-9-6" />'
      : '<path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"/><circle cx="10" cy="10" r="2.5"/>';
  });

  // ── helpers ─────────────────────────────────────────────────────────────────
  function showAlert(msg, type = 'error') {
    alertEl.textContent = msg;
    alertEl.className = 'alert ' + type;
  }
  function hideAlert() { alertEl.className = 'alert'; }

  function setLoading(btn, textEl, spinEl, on) {
    btn.disabled = on;
    textEl.style.display = on ? 'none' : 'inline';
    spinEl.style.display = on ? 'block' : 'none';
  }

  function showOtpStep() {
    loginForm.style.display = 'none';
    otpForm.style.display = 'block';
    document.getElementById('otp-code').focus();
  }

  function showLoginStep() {
    otpForm.style.display = 'none';
    loginForm.style.display = 'block';
    _otpToken = null;
    hideAlert();
  }

  // ── Step 1: submit credentials ───────────────────────────────────────────────
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();
    const email    = document.getElementById('email').value.trim();
    const password = pwInput.value;
    _remember      = document.getElementById('remember').checked;

    if (!email || !password) { showAlert('Please fill in all fields.'); return; }

    const btn  = document.getElementById('submit-btn');
    const txt  = document.getElementById('btn-text');
    const spin = document.getElementById('spinner');
    setLoading(btn, txt, spin, true);

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password, remember: _remember }),
      });
      const data = await res.json();

      if (res.status === 429) {
        showAlert(data.error || 'Too many attempts. Please wait before trying again.');
        setLoading(btn, txt, spin, false);
        return;
      }
      if (!res.ok) {
        showAlert(data.error || 'Login failed.');
        setLoading(btn, txt, spin, false);
        return;
      }

      // Direct login (dev mode / SMTP not configured)
      if (data.status === 'ok') {
        window.location.href = data.redirect || '/dashboard';
        return;
      }

      // 2FA required
      if (data.status === 'otp_required') {
        _otpToken = data.otp_token;
        showOtpStep();
        setLoading(btn, txt, spin, false);
        return;
      }

      showAlert('Unexpected response. Please try again.');
      setLoading(btn, txt, spin, false);
    } catch {
      showAlert('Network error. Please try again.');
      setLoading(btn, txt, spin, false);
    }
  });

  // ── Step 2: submit OTP ───────────────────────────────────────────────────────
  otpForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();
    const code = document.getElementById('otp-code').value.trim().replace(/\s/g, '');

    if (!code || code.length !== 6 || !/^\d{6}$/.test(code)) {
      showAlert('Please enter the 6-digit code from your email.');
      return;
    }
    if (!_otpToken) { showLoginStep(); return; }

    const btn  = document.getElementById('otp-btn');
    const txt  = document.getElementById('otp-btn-text');
    const spin = document.getElementById('otp-spinner');
    setLoading(btn, txt, spin, true);

    try {
      const res  = await fetch('/api/auth/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ otp_token: _otpToken, code, remember: _remember }),
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert(data.error || 'Invalid or expired code. Please try again.');
        setLoading(btn, txt, spin, false);
        document.getElementById('otp-code').value = '';
        document.getElementById('otp-code').focus();
        return;
      }
      window.location.href = data.redirect || '/dashboard';
    } catch {
      showAlert('Network error. Please try again.');
      setLoading(btn, txt, spin, false);
    }
  });

  // ── Back button ──────────────────────────────────────────────────────────────
  document.getElementById('back-btn').addEventListener('click', showLoginStep);

  // ── Auto-submit OTP when 6 digits entered ────────────────────────────────────
  document.getElementById('otp-code').addEventListener('input', function() {
    if (this.value.replace(/\s/g,'').length === 6) {
      otpForm.dispatchEvent(new Event('submit'));
    }
  });
</script>
</body>
</html>
