<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Mukku AI Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050912; --card: #0c1424; --cyan: #00d4ff; --violet: #8b30ff;
      --border: rgba(0,212,255,0.09); --text: #d8eeff; --muted: rgba(216,238,255,0.45);
      --error: #ff4d6d; --success: #00c896; --mono: 'JetBrains Mono', monospace;
    }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(0,212,255,0.028) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.028) 1px, transparent 1px);
      background-size: 64px 64px; animation: gs 30s linear infinite;
    }
    @keyframes gs { to { background-position: 64px 64px; } }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); z-index: 0; }
    .orb-1 { top: 10%; left: 20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(139,48,255,0.07), transparent 70%); }
    .orb-2 { bottom: 10%; right: 20%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(0,212,255,0.06), transparent 70%); }

    .wrap { position: relative; z-index: 1; width: 100%; max-width: 400px; }

    .logo { display: flex; align-items: center; gap: .55rem; justify-content: center; margin-bottom: 2rem; text-decoration: none; }
    .logo-text {
      font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.15rem;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem 2rem; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,48,255,0.5), rgba(0,212,255,0.3), transparent);
    }

    /* icon */
    .icon-wrap {
      width: 56px; height: 56px; border-radius: 14px;
      background: rgba(0,212,255,0.07); border: 1px solid rgba(0,212,255,0.15);
      display: flex; align-items: center; justify-content: center; margin-bottom: 1.4rem;
    }

    .title { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: -.03em; margin-bottom: .4rem; }
    .sub { font-size: .88rem; color: var(--muted); line-height: 1.65; margin-bottom: 2rem; }

    .form-group { margin-bottom: 1.4rem; }
    .form-label { display: block; font-family: var(--mono); font-size: .7rem; font-weight: 500; letter-spacing: .06em; color: var(--muted); text-transform: uppercase; margin-bottom: .45rem; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: .4; pointer-events: none; }
    .form-input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: .8rem 1rem .8rem 2.6rem;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .form-input::placeholder { color: var(--muted); }
    .form-input:focus { border-color: rgba(0,212,255,0.4); box-shadow: 0 0 0 3px rgba(0,212,255,0.07); }

    .btn {
      width: 100%; padding: .88rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--violet), var(--cyan)); color: #fff;
      font-family: 'Space Grotesk', sans-serif; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: transform .2s, box-shadow .2s, opacity .2s;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.25); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert { padding: .75rem 1rem; border-radius: 8px; font-size: .85rem; margin-bottom: 1.25rem; display: none; align-items: center; gap: .5rem; }
    .alert.error   { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,.25); color: var(--error); display: flex; }
    .alert.success { background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,.25); color: var(--success); display: flex; }

    /* success state */
    .success-state { display: none; text-align: center; padding: 1rem 0; }
    .success-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .success-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: .6rem; }
    .success-text { font-size: .88rem; color: var(--muted); line-height: 1.65; }
    .success-text strong { color: var(--cyan); }

    .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: .85rem; color: var(--muted); }
    .back-link a { color: var(--cyan); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
  <a href="/" class="logo">
    <img src="/static/mukku_logo.png" alt="" height="28" onerror="this.style.display='none'" />
    <span class="logo-text">Mukku AI Studio</span>
  </a>

  <div class="card">
    <div id="form-state">
      <div class="icon-wrap">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.8">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <h1 class="title">Forgot your password?</h1>
      <p class="sub">Enter the email associated with your account and we'll send a reset link valid for 1 hour.</p>

      <div id="alert" class="alert"></div>

      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2.5 6.5l7.5 5 7.5-5M3 5h14a1 1 0 011 1v8a1 1 0 01-1 1H3a1 1 0 01-1-1V6a1 1 0 011-1z"/>
            </svg>
            <input id="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
          </div>
        </div>
        <button type="submit" class="btn" id="submit-btn">
          <span id="btn-text">Send Reset Link →</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </form>
    </div>

    <div class="success-state" id="success-state">
      <div class="success-icon">📬</div>
      <div class="success-title">Check your inbox</div>
      <p class="success-text">
        We sent a password reset link to<br>
        <strong id="sent-email"></strong><br><br>
        The link expires in 1 hour. If you don't see it, check your spam folder.
      </p>
    </div>
  </div>

  <div class="back-link"><a href="/login">← Back to sign in</a></div>
</div>

<script>
  const alertEl  = document.getElementById('alert');
  const submitBtn = document.getElementById('submit-btn');
  const btnText  = document.getElementById('btn-text');
  const spinner  = document.getElementById('spinner');

  function showAlert(msg, type = 'error') { alertEl.textContent = msg; alertEl.className = 'alert ' + type; }
  function hideAlert() { alertEl.className = 'alert'; }
  function setLoading(on) {
    submitBtn.disabled = on;
    btnText.style.display = on ? 'none' : 'inline';
    spinner.style.display = on ? 'block' : 'none';
  }

  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();
    const email = document.getElementById('email').value.trim();
    if (!email) { showAlert('Please enter your email address.'); return; }

    setLoading(true);
    try {
      const res  = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.error || 'Something went wrong.'); setLoading(false); return; }

      // Always show success (prevents email enumeration)
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('sent-email').textContent = email;
      document.getElementById('success-state').style.display = 'block';
    } catch {
      showAlert('Network error. Please try again.');
      setLoading(false);
    }
  });
</script>
</body>
</html>
