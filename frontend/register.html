<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Mukku AI Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050912; --card: #0c1424; --cyan: #00d4ff; --violet: #8b30ff;
      --border: rgba(0,212,255,0.09); --border-hov: rgba(0,212,255,0.22);
      --text: #d8eeff; --muted: rgba(216,238,255,0.45);
      --error: #ff4d6d; --success: #00c896;
      --mono: 'JetBrains Mono', monospace;
    }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; line-height: 1.6;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 1.5rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.028) 1px, transparent 1px);
      background-size: 64px 64px; animation: gridScroll 30s linear infinite;
    }
    @keyframes gridScroll { to { background-position: 64px 64px; } }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); z-index: 0; }
    .orb-1 { top: -10%; right: -5%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,212,255,0.06), transparent 70%); }
    .orb-2 { bottom: -10%; left: -10%; width: 450px; height: 450px; background: radial-gradient(circle, rgba(139,48,255,0.07), transparent 70%); }

    .auth-wrap { position: relative; z-index: 1; width: 100%; max-width: 440px; }

    .auth-logo {
      display: flex; align-items: center; gap: .55rem;
      justify-content: center; margin-bottom: 2rem; text-decoration: none;
    }
    .auth-logo-text {
      font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.2rem;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .auth-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem 2rem; position: relative; overflow: hidden;
    }
    .auth-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), rgba(139,48,255,0.5), transparent);
    }
    .auth-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem;
      font-weight: 700; letter-spacing: -.03em; margin-bottom: .35rem;
    }
    .auth-subtitle { font-size: .88rem; color: var(--muted); margin-bottom: 2rem; }
    .auth-subtitle a { color: var(--cyan); text-decoration: none; }
    .auth-subtitle a:hover { text-decoration: underline; }

    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block; font-family: var(--mono); font-size: .7rem;
      font-weight: 500; letter-spacing: .06em; color: var(--muted);
      text-transform: uppercase; margin-bottom: .45rem;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; opacity: .4; pointer-events: none;
    }
    .form-input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: .8rem 1rem .8rem 2.6rem;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .form-input::placeholder { color: var(--muted); }
    .form-input:focus { border-color: rgba(0,212,255,0.4); box-shadow: 0 0 0 3px rgba(0,212,255,0.07); }
    .form-input.error-input { border-color: var(--error); }

    .pw-toggle {
      position: absolute; right: .9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0;
      color: var(--muted); transition: color .2s;
    }
    .pw-toggle:hover { color: var(--text); }

    /* password strength */
    .pw-strength { margin-top: .5rem; }
    .pw-strength-bar {
      height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.08); overflow: hidden;
    }
    .pw-strength-fill {
      height: 100%; border-radius: 2px;
      transition: width .3s, background .3s; width: 0%;
    }
    .pw-strength-label { font-size: .68rem; color: var(--muted); margin-top: .3rem; font-family: var(--mono); }

    /* password requirements checklist */
    .pw-reqs {
      display: grid; grid-template-columns: 1fr 1fr; gap: .2rem .8rem;
      margin-top: .6rem;
    }
    .pw-req {
      display: flex; align-items: center; gap: .35rem;
      font-family: var(--mono); font-size: .66rem; color: var(--muted);
      transition: color .2s;
    }
    .pw-req.met { color: var(--success); }
    .pw-req-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; flex-shrink: 0; transition: background .2s;
    }

    /* terms */
    .terms-label {
      display: flex; align-items: flex-start; gap: .55rem;
      font-size: .82rem; color: var(--muted); cursor: pointer; margin-bottom: 1.5rem;
    }
    .terms-label input[type=checkbox] { flex-shrink: 0; margin-top: 2px; accent-color: var(--cyan); }
    .terms-label a { color: var(--cyan); text-decoration: none; }
    .terms-label a:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%; padding: .88rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      color: #fff; font-family: 'Space Grotesk', sans-serif;
      font-size: .95rem; font-weight: 600; letter-spacing: -.01em;
      cursor: pointer; transition: transform .2s, box-shadow .2s, opacity .2s;
    }
    .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.25); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }
    .btn-submit .spinner {
      display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: .75rem 1rem; border-radius: 8px; font-size: .85rem;
      margin-bottom: 1.25rem; display: none; align-items: center; gap: .5rem;
    }
    .alert.error  { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.25); color: var(--error); display: flex; }
    .alert.success{ background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,0.25); color: var(--success); display: flex; }

    /* perks list */
    .perks { display: flex; gap: 1.2rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .perk {
      display: flex; align-items: center; gap: .4rem;
      font-family: var(--mono); font-size: .68rem; color: var(--muted);
    }
    .perk-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--cyan); flex-shrink: 0; }

    .auth-bottom { text-align: center; margin-top: 1.5rem; font-size: .85rem; color: var(--muted); }
    .auth-bottom a { color: var(--cyan); text-decoration: none; font-weight: 500; }
    .auth-bottom a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .auth-card { padding: 2rem 1.4rem; }
      .auth-title { font-size: 1.4rem; }
      .perks { gap: .8rem; }
    }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="auth-wrap">
  <a href="/" class="auth-logo">
    <img src="/static/mukku_logo.png" alt="" height="30" onerror="this.style.display='none'" />
    <span class="auth-logo-text">Mukku AI Studio</span>
  </a>

  <div class="auth-card">
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Already have one? <a href="/login">Sign in</a></p>

    <div class="perks">
      <div class="perk"><div class="perk-dot"></div>Free to start</div>
      <div class="perk"><div class="perk-dot"></div>No credit card</div>
      <div class="perk"><div class="perk-dot"></div>12 languages</div>
      <div class="perk"><div class="perk-dot"></div>7 platforms</div>
    </div>

    <div id="alert" class="alert"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Full name</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="10" cy="7" r="3"/><path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6"/>
          </svg>
          <input id="name" type="text" class="form-input" placeholder="Your full name" autocomplete="name" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2.5 6.5l7.5 5 7.5-5M3 5h14a1 1 0 011 1v8a1 1 0 01-1 1H3a1 1 0 01-1-1V6a1 1 0 011-1z"/>
          </svg>
          <input id="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="4" y="9" width="12" height="9" rx="1.5"/><path d="M7 9V6a3 3 0 016 0v3"/>
          </svg>
          <input id="password" type="password" class="form-input" placeholder="8+ chars, A-Z, 0-9, symbol" autocomplete="new-password" required />
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <svg id="eye-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
              <path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"/><circle cx="10" cy="10" r="2.5"/>
            </svg>
          </button>
        </div>
        <div class="pw-strength">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="strength-fill"></div></div>
          <div class="pw-strength-label" id="strength-label">Enter a password</div>
          <div class="pw-reqs" id="pw-reqs" style="display:none">
            <div class="pw-req" id="req-len"><div class="pw-req-dot"></div>8+ characters</div>
            <div class="pw-req" id="req-upper"><div class="pw-req-dot"></div>Uppercase letter</div>
            <div class="pw-req" id="req-digit"><div class="pw-req-dot"></div>Number (0–9)</div>
            <div class="pw-req" id="req-special"><div class="pw-req-dot"></div>Special character</div>
          </div>
        </div>
      </div>

      <label class="terms-label">
        <input type="checkbox" id="terms" required />
        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </label>

      <button type="submit" class="btn-submit" id="submit-btn">
        <span id="btn-text">Create Account →</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
  </div>

  <div class="auth-bottom">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>

<script>
  const alertEl  = document.getElementById('alert');
  const submitBtn = document.getElementById('submit-btn');
  const btnText  = document.getElementById('btn-text');
  const spinner  = document.getElementById('spinner');
  const pwInput  = document.getElementById('password');
  const pwToggle = document.getElementById('pw-toggle');
  const eyeIcon  = document.getElementById('eye-icon');
  const strengthFill  = document.getElementById('strength-fill');
  const strengthLabel = document.getElementById('strength-label');

  // password toggle
  pwToggle.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="M3 3l14 14M7.5 7.9A3 3 0 0013 13M1 10s3.5-6 9-6m9 6s-1.5 2.5-4.5 4.5M10 16c-5.5 0-9-6-9-6" />'
      : '<path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"/><circle cx="10" cy="10" r="2.5"/>';
  });

  const pwReqs    = document.getElementById('pw-reqs');
  const reqLen    = document.getElementById('req-len');
  const reqUpper  = document.getElementById('req-upper');
  const reqDigit  = document.getElementById('req-digit');
  const reqSpecial= document.getElementById('req-special');

  function checkReq(el, met) { el.classList.toggle('met', met); }

  // password strength + requirements
  pwInput.addEventListener('input', () => {
    const v = pwInput.value;
    const hasLen     = v.length >= 8;
    const hasUpper   = /[A-Z]/.test(v);
    const hasDigit   = /[0-9]/.test(v);
    const hasSpecial = /[^A-Za-z0-9]/.test(v);

    if (v.length > 0) pwReqs.style.display = 'grid'; else pwReqs.style.display = 'none';
    checkReq(reqLen,     hasLen);
    checkReq(reqUpper,   hasUpper);
    checkReq(reqDigit,   hasDigit);
    checkReq(reqSpecial, hasSpecial);

    let score = 0;
    if (hasLen)        score++;
    if (v.length >= 12) score++;
    if (hasUpper)      score++;
    if (hasDigit)      score++;
    if (hasSpecial)    score++;
    const pct   = [0, 25, 45, 65, 82, 100][score];
    const color = ['#ff4d6d', '#ff7a00', '#f0c030', '#00c896', '#00d4ff'][Math.max(0, score - 1)] || '#ff4d6d';
    const label = ['Too short', 'Weak', 'Fair', 'Good', 'Strong', 'Excellent'][score];
    strengthFill.style.width = pct + '%';
    strengthFill.style.background = color;
    strengthLabel.textContent = v.length ? label : 'Enter a password';
    strengthLabel.style.color = v.length ? color : 'var(--muted)';
  });

  function showAlert(msg, type = 'error') { alertEl.textContent = msg; alertEl.className = 'alert ' + type; }
  function hideAlert() { alertEl.className = 'alert'; }
  function setLoading(on) {
    submitBtn.disabled = on;
    btnText.style.display = on ? 'none' : 'inline';
    spinner.style.display = on ? 'block' : 'none';
  }

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = pwInput.value;
    const terms    = document.getElementById('terms').checked;

    if (!name)     { showAlert('Please enter your full name.'); return; }
    if (!email)    { showAlert('Please enter your email address.'); return; }
    if (password.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
    if (!/[A-Z]/.test(password)) { showAlert('Password must contain at least one uppercase letter.'); return; }
    if (!/[0-9]/.test(password)) { showAlert('Password must contain at least one number.'); return; }
    if (!/[^A-Za-z0-9]/.test(password)) { showAlert('Password must contain at least one special character (e.g. !@#$%).'); return; }
    if (!terms)    { showAlert('Please accept the Terms of Service to continue.'); return; }

    setLoading(true);
    try {
      const res  = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ name, email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.error || 'Registration failed.'); setLoading(false); return; }
      showAlert('Account created! Redirecting…', 'success');
      setTimeout(() => { window.location.href = data.redirect || '/dashboard'; }, 800);
    } catch {
      showAlert('Network error. Please try again.');
      setLoading(false);
    }
  });
</script>
</body>
</html>
